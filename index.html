<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffd6ec">
<title>คุณเป็นใครในโรงเรียนนี้?</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffd6ec,#ffc0cb);
  display:flex;
  justify-content:center;
  padding:20px;
  overflow:hidden;
  min-height:100vh;
  box-sizing:border-box;
  transition:background 1.5s ease;
}

.box{
  background:rgba(255,255,255,0.95);
  padding:20px;
  border-radius:25px;
  max-width:420px;
  width:100%;
  text-align:center;
  max-height:92vh;
  overflow-y:auto;
  backdrop-filter:blur(10px);
  box-sizing:border-box;
}

h2,h3{margin:0 0 20px 0;color:#333;}
h3{font-size:1.3em;}
p{font-size:1.1em;line-height:1.5;}

button{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:999px;
  border:none;
  background:white;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  transition:0.2s;
  color:#333;
}
button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15);}
button:active{transform:scale(0.96);}

/* sparkle */
.sparkle{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  animation:pop 1s forwards;
  pointer-events:none;
  z-index:999;
}
@keyframes pop{
  0%{opacity:1;transform:scale(0.5);}
  100%{opacity:0;transform:scale(2);}
}

/* floating stars */
.floating-star{
  position:fixed;
  font-size:18px;
  pointer-events:none;
  animation:floatUp linear forwards;
  opacity:0.8;
  z-index:1;
}

@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0.8);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-10vh) scale(1.3);opacity:0;}
}

/* progress bars */
.progress-bar{
  margin:12px 0;
  text-align:left;
}
.progress-bar div{
  height:8px;
  border-radius:10px;
  transition:0.8s ease-out;
}

/* result layout */
.result-title{
  margin:0 0 10px;
}
.result-emoji{
  font-size:70px;
  margin:18px 0 8px;
}
.result-name{
  margin:0 0 10px;
  font-size:20px;
}
.result-desc{
  font-size:15px;
  line-height:1.55;
  margin:0 0 18px;
}
.score-title{
  text-align:left;
  margin:10px 0 8px;
  font-weight:bold;
}

.result-page{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:12px;
  box-sizing:border-box;
}

.result-card{
  width:100%;
  max-width:390px;
  max-height:92vh;
  overflow-y:auto;
  background:rgba(255,255,255,0.96);
  border-radius:30px;
  padding:18px 16px 20px;
  text-align:center;
  box-sizing:border-box;
  backdrop-filter:blur(10px);
}

.progress-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin:10px 0;
  text-align:left;
}

.progress-label{
  min-width:90px;
  font-size:14px;
  font-weight:600;
  color:#333;
}

.progress-container{
  flex:1;
  background:#eaeaea;
  height:8px;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  border-radius:999px;
}

.progress-fill.star{
  background:linear-gradient(90deg,hotpink,#fff);
}
.progress-fill.sun{
  background:linear-gradient(90deg,#ffe066,#fff);
}
.progress-fill.shadow{
  background:linear-gradient(90deg,#000,#f44);
}
.progress-fill.bl{
  background:linear-gradient(90deg,red,orange,yellow,green,blue,violet);
}
.progress-fill.normal{
  background:linear-gradient(90deg,#4CAF50,#fff);
}

.restart-btn{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg,#ff5ca8,#ff87bf);
  color:white;
  font-size:18px;
  font-weight:bold;
}

/* Responsive */
@media (max-width: 480px) {
  .box { padding:15px; margin:0; }
  button { padding:12px; }
  h3 { font-size:1.2em; }
}
</style>
</head>

<body>
<div class="box" id="app"></div>

<script>
// floating stars
function spawnStar(){
  const stars=["⭐","✨","💫","🌟","🫧","🌸"];
  let s=document.createElement("div");
  s.className="floating-star";
  s.innerText=stars[Math.floor(Math.random()*stars.length)];
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}
setInterval(spawnStar,400);

// sparkle click
function sparkle(x,y){
  for(let i=0;i<10;i++){
    let d=document.createElement("div");
    d.className="sparkle";
    d.style.left=(x+Math.random()*40-20)+"px";
    d.style.top=(y+Math.random()*40-20)+"px";
    d.style.background=["#fff","#ff9ad5","#ffe08a"][Math.floor(Math.random()*3)];
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),800);
  }
}

// QUESTIONS
const questions=[
{q:"1. ระหว่างทางเดินไปโรงเรียน คุณคิดว่าคุณจะเจออะไร",a:[["สาวคาบขนมปัง","star"],["อาจารย์สุดโหด","sun"],["หมาป่าใส่ฮู้ด","shadow"],["เพื่อนสมัยเด็กน่ารัก","bl"],["ถนน","normal"]]},
{q:"2. เลือกที่นั่งของคุณ",a:[["คนเดียว","normal"],["คนที่ดูพึ่งได้","sun"],["สุ่ม กับใครนั่งก็เริ่ด","star"],["เพื่อนเก่า","bl"],["หลังห้อง ริมหน้าต่าง","shadow"]]},
{q:"3. มีคนชวนกินข้าว",a:[["หึ","shadow"],["ไปสิครับ","sun"],["ไม่เป็นไรไปก็ได้แล้วแต่","normal"],["ก็ได้ค่ะ เริ่ดนะ","star"],["ไปดิ","bl"]]},
{q:"4. ของตก",a:[["ยืนเฉย ๆ รอโชคชะตา","bl"],["เก็บเอง","normal"],["ขอความช่วยเหลือ","star"],["ยิ้มแล้วคุ้ยหาของ","sun"],["ตะโกนสุดเสียง","shadow"]]},
{q:"5. เพื่อนโดนแกล้ง",a:[["เม้าแฟ่ด รู้ทั้งจังหวัด ลงทุกแฟลตฟอร์ม","star"],["ไม่ยุ่งดีกว่า วุ่นวาย","normal"],["ต่อยเลยละกัน หึ","shadow"],["ห้ามแล้วยิ้มให้ไม่เอาความรุนแรง","sun"],["มาหาฉันฉันจะช่วยเอง","bl"]]},
{q:"6. เพื่อนชวนทำการบ้าน",a:[["คนเดียว หึ","shadow"],["โอเค","normal"],["ช่วยกันนะ","sun"],["เซลฟี่ก็สวยอะ มุมนี้สวย ไว้ก่อนน้า","star"],["เพื่อเธอทำได้ทุกอย่าง","bl"]]},
{q:"7. เพื่อนชวนไปเที่ยว",a:[["อยู่บ้านนานแล้ว แอบเสียใจ","shadow"],["คาเฟ่ไหม ถ่ายรูปไหม รรรเริ่ดด","star"],["ขอพักนะเหนื่อย","normal"],["ไปหมดครับ ชอบอยู่กับเพื่อน","sun"],["เธอเลือกเลย ไปทุกที่ที่มีเธอ","bl"]]},
{q:"8. แลกไอจี",a:[["ไม่เล่น แอบใช้รูปคาเนกิ","shadow"],["ได้ดิ","normal"],["ว้ายยยยยยยยยยยยยย","star"],["ครับแต่ไม่ค่อยได้เล่นนะ","sun"],["ฟอลแล้วเดมมา เดมมา","bl"]]},
{q:"9. ครูไม่อยู่",a:[["ไลฟ์หน่อย สวัสดีโซเชี่ยลแคม","star"],["นั่งทำงาน","normal"],["หลับแต่แอบมอง","shadow"],["คุยกับเพื่อนเฮฮา","sun"],["แทรกตัวกับผู้คนโปรยคำหวาน","bl"]]},
{q:"10. มีคนมาชอบ",a:[["เปิดตัวเลยไหม","star"],["เอ่อ..ขอบคุณ","normal"],["ยัยบ๊อง พ..พ..พูดอะไรเนี่ย ให้ตายเถอะ ฉันไม่ได้ชอบเธอแต่..รู้จัก..เห้ย ไม่ได้สิ","shadow"],["ขอบคุณนะ แต่เรามารู้จักกันก่อนดีไหม","sun"],["เราลองเป็นแฟนกันเลยได้ไหม ก็เพราะฉันเป็นคนไม่คุย คุยไม่เป๋น","bl"]]},
{q:"11. งานกลุ่ม",a:[["ไม่มีใครเอาเข้ากลุ่ม...?","shadow"],["เล่นบ้างจริงจังบ้าง","star"],["คุณและผองเพื่อน งานกลุ่มแบบเดี่ยว","normal"],["หลีดเดอร์ ช่วยเหลือ น่าเชื่อถือ","sun"],["เดี๋ยวแอบทำส่วนของคนที่ชอบให้","bl"]]}
];

// RESULTS
const results = {
  star: {
    text: "◇ ดาวหกแฉก ◇<br>คุณเป็นดาวเด่น ค้ำฟ้า เพราะสร้างด้วยตัวเอง ยอดฟอลไอจีเกือบจะเป็นลิซ่าไม่รู้ปั้นมาจากไหน",
    emoji: "⭐",
    color: "linear-gradient(180deg,hotpink,#fff)"
  },
  sun: {
    text: "◇ พี่โชนของทุกคน ◇<br>คุณทำให้โรงเรียนสงบและน่าอยู่ขึ้น ใจดีและน่าประทับใจมีความเชื่อมั่น",
    emoji: "☀️",
    color: "linear-gradient(180deg,#ffe066,#fff)"
  },
  shadow: {
    text: "◇ ข้าขอเป็นเงา อะตอมมิค ◇<br>เบียวกับอินโทรเวิทเส้นคั่นหนาตึ้บแต่คุณเป็น หึ ไม่ได้เบียวแค่เป็นหนึ่งเดียวกับความมืด คุณพึ่งตัวเองไฟนอลบอส โหด",
    emoji: "🦇",
    color: "linear-gradient(180deg,#000,#f44)"
  },
  bl: {
    text: "◇ ดาราวาย ◇<br>เคมีระเบิด เสิร์ฟเก่ง ทุกคนเก็ท ปากหวาน ครับสุดสวย",
    emoji: "🌈",
    color: "linear-gradient(90deg,red,orange,yellow,green,blue,violet)"
  },
  normal: {
    text: "◇ แค่คนธรรมดา ◇<br>ในโลกวุ่นวายคุณเป็นคนธรรมดา เหมือน npc แต่เพราะมีคุณโลกเลยดำเนินได้ ถึงแม้จะไปในทางที่ว่าไม่เอาแล้ว โอ้ย ปล่อยฉันไป๊",
    emoji: "🙏",
    color: "linear-gradient(180deg,#4CAF50,#fff)"
  }
};

let scores={star:0,sun:0,shadow:0,bl:0,normal:0};
let current=0;

function render(){
  let app=document.getElementById("app");

  if(current<questions.length){
    let q=questions[current];
    app.innerHTML=`<h3>${q.q}</h3>`;
    q.a.forEach(choice=>{
      let btn=document.createElement("button");
      btn.innerText=choice[0];
      btn.onclick=(e)=>{
        sparkle(e.clientX,e.clientY);
        scores[choice[1]]++;
        current++;
        render();
      };
      app.appendChild(btn);
    });
  }else{
    let max = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);
    const total = questions.length;
    const bar = (s) => (s / total) * 100;

    document.body.style.background = results[max].color;
    document.body.style.backgroundSize = "400% 400%";

    app.innerHTML = `
      <div class="result-page">
        <div class="result-card">
          <h2 class="result-title">ผลลัพธ์ของคุณ</h2>

          <div class="result-emoji">${results[max].emoji}</div>

          <h3 class="result-name">${results[max].text.split("<br>")[0]}</h3>
          <p class="result-desc">${results[max].text.split("<br>")[1]}</p>

          <div class="score-title">คะแนนของคุณ:</div>

          <div class="progress-row">
            <span class="progress-label">⭐ ดาว ${scores.star}</span>
            <div class="progress-container">
              <div class="progress-fill star" style="width:${bar(scores.star)}%"></div>
            </div>
          </div>

          <div class="progress-row">
            <span class="progress-label">☀️ พี่โชน ${scores.sun}</span>
            <div class="progress-container">
              <div class="progress-fill sun" style="width:${bar(scores.sun)}%"></div>
            </div>
          </div>

          <div class="progress-row">
            <span class="progress-label">🦇 เงา ${scores.shadow}</span>
            <div class="progress-container">
              <div class="progress-fill shadow" style="width:${bar(scores.shadow)}%"></div>
            </div>
          </div>

          <div class="progress-row">
            <span class="progress-label">🌈 ดาราวาย ${scores.bl}</span>
            <div class="progress-container">
              <div class="progress-fill bl" style="width:${bar(scores.bl)}%"></div>
            </div>
          </div>

          <div class="progress-row">
            <span class="progress-label">🙏 คนธรรมดา ${scores.normal}</span>
            <div class="progress-container">
              <div class="progress-fill normal" style="width:${bar(scores.normal)}%"></div>
            </div>
          </div>

          <button class="restart-btn" onclick="location.reload()">🎮 เล่นใหม่</button>
        </div>
      </div>
    `;

    if(max==="bl"){
      document.body.style.background = results.bl.color;
    }
  }
}

render();
</script>
</body>
</html>
