<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คุณเป็นใครในโรงเรียนนี้?</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #ffd6ec, #ffc0cb);
  display: flex;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
  transition: 0.5s;
}

/* กล่องหลัก */
.box {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 25px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 25px rgba(255,182,193,0.3);
}

/* หัวข้อ */
h2 {
  background: linear-gradient(90deg, #ff9ad5, #ffb6f9);
  padding: 12px;
  border-radius: 20px;
  color: white;
  font-size: 18px;
}

/* ปุ่ม */
button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #fff, #ffe0f0);
  font-weight: bold;
}

button:active {
  transform: scale(0.96);
}

/* ✨ glitter ตอนกด */
.sparkle {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: glitter 1s ease-out forwards;
}
@keyframes glitter {
  0% {transform: scale(0.5);opacity:1;}
  100% {transform: scale(2);opacity:0;}
}

/* 💖 อิโมจิลอย */
.floating {
  position: fixed;
  font-size: 18px;
  pointer-events: none;
  animation: floatUp linear forwards;
}
@keyframes floatUp {
  0% {transform: translateY(100vh); opacity:0;}
  20% {opacity:1;}
  100% {transform: translateY(-10vh); opacity:0;}
}

/* 🌈 rainbow */
.rainbow-bg {
  background: linear-gradient(270deg, red, orange, yellow, green, blue, indigo, violet);
  background-size: 1400% 1400%;
  animation: rainbowMove 8s ease infinite;
}
@keyframes rainbowMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* glow */
.glow {
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from {text-shadow:0 0 10px white;}
  to {text-shadow:0 0 25px gold;}
}

.float {
  animation: float 2s infinite ease-in-out;
}
@keyframes float {
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}
</style>
</head>

<body>
<div class="box" id="app"></div>

<script>
// ✨ glitter
function spawnGlitter(x,y){
  const colors=["#fff","#ffd6ec","#ffe08a","#caffff","#e0bbff"];
  for(let i=0;i<12;i++){
    let d=document.createElement("div");
    d.className="sparkle";
    d.style.left=x+(Math.random()*50-25)+"px";
    d.style.top=y+(Math.random()*50-25)+"px";
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1000);
  }
}

// 💖 อิโมจิลอยพื้นหลัง
function spawnFloating(){
  const emojis=["✨","💖","⭐","🌸","💫","🫧"];
  let e=document.createElement("div");
  e.className="floating";
  e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left=Math.random()*100+"vw";
  e.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),5000);
}
setInterval(spawnFloating,500);

// 📊 QUESTIONS
const questions = [
{q:"1. ระหว่างทางเดินไปโรงเรียน คุณคิดว่าคุณจะเจออะไร",a:[
["สาวคาบขนมปัง","star"],["อาจารย์โหด","sun"],["หมาป่าใส่ฮู้ด","shadow"],["เพื่อนน่ารัก","bl"],["ถนน","normal"]
]},
{q:"2. ตอนเข้าห้องแล้วต้องเลือกที่นั่ง คุณจะนั่งกับใคร",a:[
["คนเดียว","normal"],["คนที่ดูเชื่อถือได้","sun"],["สุ่ม ๆ ไปสักคนน่ะแหละ","star"],["เพื่อนเก่า","bl"],["หลังห้องริมหน้าต่าง","shadow"]
]},
{q:"3. มีคนชวนกินข้าว",a:[
["หึ","shadow"],["ไปสิครับ","sun"],["แล้วแต่","normal"],["เริ่ดนะ","star"],["ไปดิ","bl"]
]},
{q:"4. ของตก",a:[
["ยืนเฉย ๆ","bl"],["เก็บเอง","normal"],["ขอช่วย","star"],["ยิ้มแล้วเก็บ","sun"],["ตะโกน","shadow"]
]},
{q:"5. เพื่อนโดนแกล้ง",a:[
["เม้า","star"],["ไม่ยุ่ง","normal"],["ต่อย","shadow"],["ห้าม","sun"],["ช่วยเอง","bl"]
]},
{q:"6. ทำการบ้าน",a:[
["คนเดียว","shadow"],["โอเค","normal"],["ช่วยกัน","sun"],["เซลฟี่ก่อน","star"],["เพื่อเธอ","bl"]
]},
{q:"7. ไปเที่ยว",a:[
["อยู่บ้าน","shadow"],["คาเฟ่","star"],["พัก","normal"],["ไปหมด","sun"],["ไปกับเธอ","bl"]
]},
{q:"8. แลกไอจี",a:[
["ไม่เล่น","shadow"],["ได้","normal"],["เพิ่มฟอล","star"],["ไม่ค่อยเล่น","sun"],["เดมมา","bl"]
]},
{q:"9. ครูไม่อยู่",a:[
["ไลฟ์","star"],["ทำงาน","normal"],["หลับ","shadow"],["คุย","sun"],["หวาน","bl"]
]},
{q:"10. มีคนชอบ",a:[
["เปิดตัว","star"],["เฉย ๆ","normal"],["หึ","shadow"],["คุยก่อน","sun"],["เป็นแฟนเลย","bl"]
]}
];

let scores={star:0,sun:0,shadow:0,bl:0,normal:0};
let current=0;

function render(){
let app=document.getElementById("app");

if(current<questions.length){
let q=questions[current];
app.innerHTML=`<h2>${q.q}</h2>`;

q.a.forEach(choice=>{
let btn=document.createElement("button");
btn.innerText=choice[0];

btn.onclick=(e)=>{
spawnGlitter(e.clientX||200,e.clientY||200);
scores[choice[1]]++;
current++;
setTimeout(render,200);
};

app.appendChild(btn);
});

}else{
showResult();
}
}

function showResult(){
let max=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

const results={
star:{text:`⭐ ดาวหกแฉก<br>อินฟลูสายเม้าท์ฉ่ำ`,color:"#FFD700"},
sun:{text:`☀️ พี่โชนของทุกคน<br>ใจดี น่ารัก`,color:"#87CEFA"},
shadow:{text:`🌑 เงาอะตอมมิค<br>สายดาร์ค`,color:"#1a001f"},
bl:{text:`🌈 ดาราวาย<br>เสิร์ฟเก่ง`,color:"rainbow"},
normal:{text:`🌿 คนธรรมดา<br>อินโทรเวิท`,color:"#4CAF50"}
};

document.body.classList.remove("rainbow-bg");

if(results[max].color==="rainbow"){
document.body.classList.add("rainbow-bg");
}else{
document.body.style.background=results[max].color;
}

document.body.style.color=(max==="shadow")?"white":"black";

document.getElementById("app").innerHTML=
`<h2>ผลลัพธ์ของคุณ</h2>
<p>${results[max].text}</p>
<button onclick="location.reload()">เล่นใหม่</button>`;
}

render();
</script>
</body>
</html>
