<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คุณเป็นใครในโรงเรียนนี้?</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffd6ec,#ffc0cb);
  display:flex;
  justify-content:center;
  padding:20px;
  overflow:hidden;
  position:relative;
}

.box{
  background:rgba(255,255,255,0.95);
  padding:20px;
  padding-bottom:90px;
  border-radius:25px;
  max-width:420px;
  width:100%;
  text-align:center;
  position:relative;
  z-index:2;
}

h2,h3{margin:0 0 20px 0;color:#333;}
h3{font-size:1.3em;}
p{font-size:1.1em;line-height:1.5;}

/* ปุ่ม */
button{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:999px;
  border:none;
  background:white;
  font-weight:bold;
  font-size:16px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}
button:hover{transform:translateY(-2px);}
button:active{transform:scale(0.96);}

/* sparkle */
.sparkle{
  position:fixed;
  width:8px;height:8px;
  border-radius:50%;
  animation:pop 1s forwards;
  pointer-events:none;
  z-index:10;
}
@keyframes pop{
  0%{opacity:1;transform:scale(0.5);}
  100%{opacity:0;transform:scale(2);}
}

/* ลอย */
.float{
  position:fixed;
  animation:up linear forwards;
  pointer-events:none;
  z-index:1;
  font-size:20px;
}
@keyframes up{
  0%{transform:translateY(100vh) scale(0.8);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-20vh) scale(1.2);opacity:0;}
}

/* footer */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  z-index:1;
}
.footer img{
  width:65%;
  max-width:250px;
  opacity:0.8;
}

/* progress */
.progress{
  background:#eee;
  height:8px;
  border-radius:10px;
  margin:8px 0;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  transition:width 0.8s ease-out;
}

/* Responsive */
@media (max-width:480px){
  .box{padding:15px;padding-bottom:80px;}
}
</style>
</head>

<body>

<div class="box" id="app"></div>

<div class="footer">
<img src="https://img1.pic.in.th/images/._20260422_195132_0000.th.png">
</div>

<script>
// ⭐ ลอยตอนทำ
setInterval(()=>{
  let e=document.createElement("div");
  e.className="float";
  e.innerText=["✨","⭐","💫"][Math.floor(Math.random()*3)];
  e.style.left=Math.random()*100+"vw";
  e.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),5000);
},400);

// ✨ sparkle
function sparkle(x,y){
  for(let i=0;i<8;i++){
    let d=document.createElement("div");
    d.className="sparkle";
    d.style.left=(x+Math.random()*40-20)+"px";
    d.style.top=(y+Math.random()*40-20)+"px";
    d.style.background="#ff9ad5";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),800);
  }
}

// 🎯 emoji ตอนเฉลย
function resultFX(type){
  const map={
    star:["⭐","✨","🌟"],
    sun:["☀️","💛","✨"],
    shadow:["🦇","🌑"],
    bl:["🌈","💖"],
    normal:["🌱","🍃"]
  };
  for(let i=0;i<20;i++){
    let e=document.createElement("div");
    e.className="float";
    e.innerText=map[type][Math.floor(Math.random()*map[type].length)];
    e.style.left=Math.random()*100+"vw";
    e.style.animationDuration="3s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),3000);
  }
}

// ❓ questions - 11 ข้อใหม่ล่าสุด!
const questions=[
{q:"1. ระหว่างทางเดินไปโรงเรียน คุณคิดว่าคุณจะเจออะไร",a:[["สาวคาบขนมปัง","star"],["อาจารย์สุดโหด","sun"],["หมาป่าใส่ฮู้ด","shadow"],["เพื่อนสมัยเด็กน่ารัก","bl"],["ถนน","normal"]]},
{q:"2. เลือกที่นั่งของคุณ",a:[["คนเดียว","normal"],["คนที่ดูพึ่งได้","sun"],["สุ่ม กับใครนั่งก็เริ่ด","star"],["เพื่อนเก่า","bl"],["หลังห้อง ริมหน้าต่าง","shadow"]]},
{q:"3. มีคนชวนกินข้าว",a:[["หึ","shadow"],["ไปสิครับ","sun"],["ไม่เป็นไรไปก็ได้แล้วแต่","normal"],["ก็ได้ค่ะ เริ่ดนะ","star"],["ไปดิ","bl"]]},
{q:"4. ของตก",a:[["ยืนเฉย ๆ รอโชคชะตา","bl"],["เก็บเอง","normal"],["ขอความช่วยเหลือ","star"],["ยิ้มแล้วคุ้ยหาของ","sun"],["ตะโกนสุดเสียง","shadow"]]},
{q:"5. เพื่อนโดนแกล้ง",a:[["เม้าแฟ่ด รู้ทั้งจังหวัด ลงทุกแฟลตฟอร์ม","star"],["ไม่ยุ่งดีกว่า วุ่นวาย","normal"],["ต่อยเลยละกัน หึ","shadow"],["ห้ามแล้วยิ้มให้ไม่เอาความรุนแรง","sun"],["มาหาฉันฉันจะช่วยเอง","bl"]]},
{q:"6. เพื่อนชวนทำการบ้าน",a:[["คนเดียว หึ","shadow"],["โอเค","normal"],["ช่วยกันนะ","sun"],["เซลฟี่ก็สวยอะ มุมนี้สวย ไว้ก่อนน้า","star"],["เพื่อเธอทำได้ทุกอย่าง","bl"]]},
{q:"7. เพื่อนชวนไปเที่ยว",a:[["อยู่บ้านนานแล้ว แอบเสียใจ","shadow"],["คาเฟ่ไหม ถ่ายรูปไหม รรรเริ่ดด","star"],["ขอพักนะเหนื่อย","normal"],["ไปหมดครับ ชอบอยู่กับเพื่อน","sun"],["เธอเลือกเลย ไปทุกที่ที่มีเธอ","bl"]]},
{q:"8. แลกไอจี",a:[["ไม่เล่น แอบใช้รูปคาเนกิ","shadow"],["ได้ดิ","normal"],["ว้ายยยยยยยยยยยยยย","star"],["ครับแต่ไม่ค่อยได้เล่นนะ","sun"],["ฟอลแล้วเดมมา เดมมา","bl"]]},
{q:"9. ครูไม่อยู่",a:[["ไลฟ์หน่อย สวัสดีโซเชี่ยลแคม","star"],["นั่งทำงาน","normal"],["หลับแต่แอบมอง","shadow"],["คุยกับเพื่อนเฮฮา","sun"],["แทรกตัวกับผู้คนโปรยคำหวาน","bl"]]},
{q:"10. มีคนมาชอบ",a:[["เปิดตัวเลยไหม","star"],["เอ่อ..ขอบคุณ","normal"],["ยัยบ๊อง พ..พ..พูดอะไรเนี่ย ให้ตายเถอะ ฉันไม่ได้ชอบเธอแต่..รู้จัก..เห้ย ไม่ได้สิ","shadow"],["ขอบคุณนะ แต่เรามารู้จักกันก่อนดีไหม","sun"],["เราลองเป็นแฟนกันเลยได้ไหม ก็เพราะฉันเป็นคนไม่คุย คุยไม่เป๋น","bl"]]},
{q:"11. งานกลุ่ม",a:[["ไม่มีใครเอาเข้ากลุ่ม...?","shadow"],["เล่นบ้างจริงจังบ้าง","star"],["คุณและผองเพื่อน งานกลุ่มแบบเดี่ยว","normal"],["หลีดเดอร์ ช่วยเหลือ น่าเชื่อถือ","sun"],["เดี๋ยวแอบทำส่วนของคนที่ชอบให้","bl"]]}
];

// 🎯 results
const results={
star:{text:"◇ ดาวหกแฉก ◇<br>คุณเป็นดาวเด่น ค้ำฟ้า เพราะสร้างด้วยตัวเอง ยอดฟอลไอจีเกือบจะเป็นลิซ่า",emoji:"⭐",color:"#FFD700"},
sun:{text:"◇ พี่โชนของทุกคน ◇<br>คุณทำให้โรงเรียนสงบและน่าอยู่ขึ้น ใจดีและน่าประทับใจ",emoji:"☀️",color:"#87CEFA"},
shadow:{text:"◇ ข้าขอเป็นเงา อะตอมมิค ◇<br>เบียวกับอินโทรเวิท คุณพึ่งตัวเองไฟนอลบอส โหด",emoji:"🦇",color:"#6a0dad"},
bl:{text:"◇ ดาราวาย ◇<br>เคมีระเบิด เสิร์ฟเก่ง ทุกคนเก็ท ปากหวาน ครับสุดสวย",emoji:"🌈",color:"rainbow"},
normal:{text:"◇ แค่คนธรรมดา ◇<br>ในโลกวุ่นวายคุณเป็นคนธรรมดา เหมือน npc แต่เพราะมีคุณโลกเลยดำเนินได้",emoji:"🙏",color:"#4CAF50"}
};

let scores={star:0,sun:0,shadow:0,bl:0,normal:0};
let current=0;

function render(){
let app=document.getElementById("app");

if(current<questions.length){
let q=questions[current];
app.innerHTML=`<h3>${q.q}</h3>`;
q.a.forEach(c=>{
let b=document.createElement("button");
b.innerText=c[0];
b.onclick=(e)=>{
sparkle(e.clientX,e.clientY);
scores[c[1]]++;
current++;
render();
};
app.appendChild(b);
});
}else{
let max=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);
resultFX(max);

const total=questions.length;
const bar=s=> (s/total)*100;

app.innerHTML=`
<h2>ผลลัพธ์ของคุณ</h2>
<div style="font-size:64px;margin:20px 0;">${results[max].emoji}</div>
<p style="font-size:1.2em;">${results[max].text}</p>

<div style="margin:25px 0;">
<h4 style="margin:0 0 15px 0;">📊 คะแนนของคุณ:</h4>

<div>⭐ ${scores.star}<div class="progress"><div class="progress-fill" style="width:${bar(scores.star)}%;background:#FFD700;"></div></div></div>
<div>☀️ ${scores.sun}<div class="progress"><div class="progress-fill" style="width:${bar(scores.sun)}%;background:#87CEFA;"></div></div></div>
<div>🦇 ${scores.shadow}<div class="progress"><div class="progress-fill" style="width:${bar(scores.shadow)}%;background:#6a0dad;"></div></div></div>
<div>🌈 ${scores.bl}<div class="progress"><div class="progress-fill" style="width:${bar(scores.bl)}%;background:linear-gradient(90deg,red,orange,yellow,green,blue,violet);"></div></div></div>
<div>🙏 ${scores.normal}<div class="progress"><div class="progress-fill" style="width:${bar(scores.normal)}%;background:#4CAF50;"></div></div></div>
</div>

<button onclick="location.reload()" style="background:#ff6b9d;color:white;font-size:18px;">🎮 เล่นใหม่</button>
`;
}
}

render();
</script>

</body>
</html>
