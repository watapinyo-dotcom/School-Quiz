<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คุณเป็นใครในโรงเรียนนี้?</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffd6ec,#ffc0cb);
  display:flex;
  justify-content:center;
  padding:20px;
  overflow:hidden;
}

.box{
  background:rgba(255,255,255,0.9);
  padding:20px;
  border-radius:25px;
  max-width:420px;
  width:100%;
  text-align:center;
}

button{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:999px;
  border:none;
  background:white;
  cursor:pointer;
  font-weight:bold;
}

button:active{ transform:scale(0.96); }

/* ✨ sparkle */
.sparkle{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  animation:pop 1s forwards;
}
@keyframes pop{
  0%{opacity:1;transform:scale(0.5);}
  100%{opacity:0;transform:scale(2);}
}

/* 🌟 floating stars */
.floating-star{
  position:fixed;
  font-size:18px;
  pointer-events:none;
  animation:floatUp linear forwards;
  opacity:0.8;
}

@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0.8);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-10vh) scale(1.3);opacity:0;}
}

/* 🌈 rainbow */
@keyframes rainbow{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}
</style>
</head>

<body>
<div class="box" id="app"></div>

<script>

// ⭐ floating stars
function spawnStar(){
  const stars=["⭐","✨","💫","🌟","🫧","🌸"];
  let s=document.createElement("div");
  s.className="floating-star";
  s.innerText=stars[Math.floor(Math.random()*stars.length)];
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}
setInterval(spawnStar,400);

// ✨ sparkle click
function sparkle(x,y){
  for(let i=0;i<10;i++){
    let d=document.createElement("div");
    d.className="sparkle";
    d.style.left=x+"px";
    d.style.top=y+"px";
    d.style.background=["#fff","#ff9ad5","#ffe08a"][Math.floor(Math.random()*3)];
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),800);
  }
}

// 📌 QUESTIONS
const questions = [
{q:"1. ระหว่างทางเดินไปโรงเรียน คุณคิดว่าคุณจะเจออะไร",a:[
["สาวคาบขนมปัง","star"],["อาจารย์โหด","sun"],["หมาป่าใส่ฮู้ด","shadow"],["เพื่อนน่ารัก","bl"],["ถนน","normal"]
]},
{q:"2. เลือกที่นั่งของคุณ",a:[
["คนเดียว","normal"],["คนดูดี","sun"],["สุ่ม","star"],["เพื่อนเก่า","bl"],["หลังห้อง","shadow"]
]},
{q:"3. มีคนชวนกินข้าว",a:[
["หึ","shadow"],["ไปสิครับ","sun"],["ไม่เป็นไรไปก็ได้แล้วแต่","normal"],["ก็ได้ค่ะ เริ่ดนะ","star"],["ไปดิ","bl"]
]},
{q:"4. ของตก",a:[
["ยืนเฉย ๆ รอโชคชะตา","bl"],["เก็บเอง","normal"],["ขอความช่วยเหลือ","star"],["ยิ้มแล้วคุ้ยหาของ","sun"],["ตะโกนสุดเสียง","shadow"]
]},
{q:"5. เพื่อนโดนแกล้ง",a:[
["เม้าแฟ่ด รู้ทั้งจังหวัด ลงทุกแฟลตฟอร์ม","star"],["ไม่ยุ่งดีกว่า วุ่นวาย","normal"],["ต่อยเลยละกัน หึ","shadow"],["ห้ามแล้วยิ้มให้ไม่เอาความรุนแรง","sun"],["มาหาฉันฉันจะช่วยเอง","bl"]
]},
{q:"6. เพื่อนชวนทำการบ้าน",a:[
["คนเดียว หึ","shadow"],["โอเค","normal"],["ช่วยกันนะ","sun"],["เซลฟี่ก็สวยอะ","star"],["เพื่อเธอทำได้ทุกอย่าง","bl"]
]},
{q:"7. เพื่อนชวนไปเที่ยว",a:[
["อยู่บ้านนานแล้ว","shadow"],["คาเฟ่ไหม ถ่ายรูปไหม รรรเริ่ดด","star"],["ขอพักนะเหนื่อย","normal"],["ไปหมดครับ ชอบอยู่กับเพื่อน","sun"],["เธอเลือกเลย ไปทุกที่ที่มีเธอ","bl"]
]},
{q:"8. แลกไอจี",a:[
["ไม่เล่น","shadow"],["ได้ดิ","normal"],["ว้ายยยยยยยยยยยยยย","star"],["ครับแต่ไม่ค่อยได้เล่นนะ","sun"],["เดมมา เดมมา","bl"]
]},
{q:"9. ครูไม่อยู่",a:[
["ไลฟ์หน่อย สวัสดีโซเชี่ยลแคม","star"],["นั่งทำงาน","normal"],["หลับแต่แอบมอง","shadow"],["คุยกับเพื่อนเฮฮา","sun"],["แทรกตัวกับผู้คนโปรยคำหวาน","bl"]
]},
{q:"10. มีคนมาชอบ",a:[
["เปิดตัวเลยสิซิส นี่ค่ะแฟนฉัน","star"],["เฉย ๆ ขอบคุณ","normal"],["หึ ขอบใจ ไปละกัน","shadow"],["คุยดี ๆ ขอบคุณนะครับ เราอาจจะยังไม่ได้ชอบเธอแต่รู้จักกันไปก่อนนะ","sun"],["หวานครับ จัดเธียร์ เปิดตัวเลยครับ เราลองเป็นแฟนกันเลยได้ไหมเพราะฉันมันเป็นคนไม่คุยคุยไม่เป็น","bl"]
]}
];

// 🎯 RESULTS + GIF
const results = {
sun:{
html:`<img src="https://cdn3.emoji.gg/emojis/3776_Sunshine.gif" width="64">
<h3>◇ พี่โชนของทุกคน ◇</h3>
<p>คุณทำให้โรงเรียนสงบและน่าอยู่ขึ้น ใจดีและน่าประทับใจ คุณเด่นคุณดัง ไม่ว่าจะตรงไหนคนก็ชอบคุณ</p>`,
color:"#87CEFA"
},

star:{
html:`<img src="https://cdn3.emoji.gg/emojis/149268-pinkyellowstarstwinkle.gif" width="64">
<h3>◇ ดาวหกแฉก ◇</h3>
<p>คุณเป็นดาวเด่น ค้ำฟ้า เพราะสร้างด้วยตัวเอง ยอดฟอลไอจีเกือบจะเป็นลิซ่าไม่รู้ว่าปั้นยอดมาแค่ไหนแต่เรียกได้ว่าเป็นอินฟลูสายเม้าท์ฉ่ำ</p>`,
color:"#FFD700"
},

shadow:{
html:`<img src="https://cdn3.emoji.gg/emojis/8524-batman-cloak.png" width="64">
<h3>◇ ข้าขอเป็นเงา อะตอมมิค ◇</h3>
<p>เบียวกับอินโทรเวิทมีเส้นคั่นที่หนาตึ้บ แต่คุณน่ะ ไม่ได้เบียวแค่เป็นส่วนเดียวกับความมืด โลกก็แบบนี้ คุณพึ่งตัวเองไฟนอลบอส โหด</p>`,
color:"#1a001f"
},

normal:{
html:`<img src="https://cdn3.emoji.gg/emojis/97521-goldenpray.png" width="64">
<h3>◇ แค่คนธรรมดา ◇</h3>
<p>ในโลกวุ่นวายคุณเป็นคนธรรมดาที่แทบจะปลงกับทุกอย่าง ขออยู่คนเดียว ไม่เอาใครแล้ว เหมือน npc แต่เพราะมีคุณโลกเลยดำเนินได้</p>`,
color:"#4CAF50"
},

bl:{
html:`<img src="https://cdn3.emoji.gg/emojis/135457-rainbowheart.gif" width="64">
<h3>◇ ดาราวาย ◇</h3>
<p>เคมีระเบิด เสิร์ฟเก่ง ทุกคนเก็ท ปากหวาน เสยผม กล้องสามจับหมด ครับสุดสวย</p>`,
color:"rainbow"
}
};

let scores={star:0,sun:0,shadow:0,bl:0,normal:0};
let current=0;

function render(){
let app=document.getElementById("app");

if(current<questions.length){
let q=questions[current];
app.innerHTML=`<h3>${q.q}</h3>`;

q.a.forEach(choice=>{
let btn=document.createElement("button");
btn.innerText=choice[0];

btn.onclick=(e)=>{
sparkle(e.clientX,e.clientY);
scores[choice[1]]++;
current++;
render();
};

app.appendChild(btn);
});

}else{
  let max = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

  const total = questions.length;
  const bar = (s) => (s / total) * 100;

  if(results[max].color==="rainbow"){
    document.body.style.background="linear-gradient(270deg,red,orange,yellow,green,blue,violet)";
    document.body.style.backgroundSize="400% 400%";
    document.body.style.animation="rainbow 5s infinite";
  }else{
    document.body.style.background=results[max].color;
  }

  app.innerHTML=`
  <h2>ผลลัพธ์ของคุณ</h2>

  ${results[max].text}

  <div style="margin-top:20px;text-align:left">

  ⭐ ดาว ${scores.star}
  <div style="background:#eee;height:8px;border-radius:10px">
  <div style="width:${bar(scores.star)}%;height:100%;background:#FFD700;border-radius:10px;transition:0.8s"></div>
  </div>

  ☀️ พี่โชน ${scores.sun}
  <div style="background:#eee;height:8px;border-radius:10px">
  <div style="width:${bar(scores.sun)}%;height:100%;background:#87CEFA;border-radius:10px;transition:0.8s"></div>
  </div>

  🦇 เงา ${scores.shadow}
  <div style="background:#eee;height:8px;border-radius:10px">
  <div style="width:${bar(scores.shadow)}%;height:100%;background:#6a0dad;border-radius:10px;transition:0.8s"></div>
  </div>

  🌈 ดาราวาย ${scores.bl}
  <div style="background:#eee;height:8px;border-radius:10px">
  <div style="width:${bar(scores.bl)}%;height:100%;background:linear-gradient(90deg,red,orange,yellow,green,blue,violet);border-radius:10px;transition:0.8s"></div>
  </div>

  🙏 คนธรรมดา ${scores.normal}
  <div style="background:#eee;height:8px;border-radius:10px">
  <div style="width:${bar(scores.normal)}%;height:100%;background:#4CAF50;border-radius:10px;transition:0.8s"></div>
  </div>

  </div>

  <button onclick="location.reload()">เล่นใหม่</button>
  `;
}

render();
</script>
</body>
</html>
